<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSOR GRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f1115; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .panel-bg { background: #16191e; border: 1px solid #262a31; }
        .stat-card { background: #1c2026; border-bottom: 2px solid #334155; }
        .accent-amber { color: #f59e0b; }
        .bg-amber-custom { background-color: #f59e0b; }
    </style>
</head>
<body class="bg-slate-200 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex justify-between items-end pb-4 border-b border-slate-800">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-slate-900 flex items-center gap-2">
                    <span class="w-2 h-6 bg-amber-500 rounded-full"></span>
                    SENSOR<span class="text-slate-900 font-light">GRID</span>
                </h1>
                <p class="text-[16px] text-slate-900 uppercase tracking-[0.2em] font-bold mt-1">Monitoramento de Temperatura</p>
            </div>
            <div class="text-right">
                <p id="clock" class="text-lg font-mono font-medium text-slate-100">00:00:00</p>
            </div>
        </header>

        <div class="flex items-center justify-between bg-[#292e36] p-3 rounded-lg border border-slate-800">
            <div class="flex items-center gap-3">
                <input id="filter-date" type="date" class="bg-slate-700 border border-slate-700 p-1.5 rounded text-xs text-slate-100 focus:outline-none focus:border-amber-500/50" />
                <button id="filter-btn" class="px-4 py-1.5 text-xs font-bold bg-slate-700 hover:bg-slate-600 text-white rounded transition-colors">FILTRAR</button>
            </div>
            <button id="today-btn" class="px-4 py-1.5 text-xs font-bold border border-slate-700 hover:bg-slate-800 text-slate-100 rounded transition-colors">HOJE</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="p-5 rounded-lg stat-card">
                <p class="text-slate-100 text-[10px] font-bold uppercase tracking-wider">Alertas Ativos</p>
                <div class="flex items-baseline gap-2">
                    <p id="critical-count" class="text-3xl font-black text-rose-500 mt-1">0</p>
                    <span class="text-xs text-slate-100 font-mono">OCORRÊNCIAS</span>
                </div>
            </div>
            <div class="p-5 rounded-lg stat-card">
                <p class="text-slate-100 text-[10px] font-bold uppercase tracking-wider">Média Térmica</p>
                <div class="flex items-baseline gap-2">
                    <p id="avg-temp" class="text-3xl font-black text-white mt-1">0°C</p>
                    <span class="text-xs text-slate-100 font-mono text-amber-500/80">NOMINAL</span>
                </div>
            </div>
            <div class="p-5 rounded-lg stat-card">
                <p class="text-slate-100 text-[10px] font-bold uppercase tracking-wider">Status do Nó</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></span>
                    <span class="text-sm font-bold text-slate-100 uppercase">Online</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 p-6 rounded-lg panel-bg h-[450px] flex flex-col">
                <h2 class="text-xs font-bold text-slate-100 uppercase mb-6 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    Análise Linear de Telemetria
                </h2>
                <div class="flex-grow">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-1 p-5 rounded-lg panel-bg flex flex-col h-[450px]">
                <h2 class="text-xs font-bold text-slate-100 uppercase mb-4">Histórico de Temperatura</h2>
                <div id="event-list" class="space-y-2 overflow-y-auto pr-2 custom-scrollbar flex-grow">
                    <p class="text-slate-100 italic text-center py-10 text-xs">Sincronizando dados...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
        }
        setInterval(updateClock, 1000);

        // --- Chart.js Palette Industrial ---
        const ctx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Temperatura',
                    data: [],
                    borderColor: '#f59e0b', 
                    backgroundColor: 'transparent',
                    borderWidth: 2,
                    pointRadius: 0,
                    pointHoverRadius: 5,
                    pointHoverBackgroundColor: '#f59e0b',
                    tension: 0.1 
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        grid: { color: '#262a31' },
                        ticks: { color: '#64748b', font: { size: 10 } }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 10 } }
                    }
                },
                plugins: {
                    legend: {
                        display: true,
                        labels: {
                            color: '#ffffff',
                            font: { size: 11, weight: '600' }
                        }
                    }
                }
            }
        });

        let criticalCount = 0;
        let allTemps = [];

        function updateStats(newTemp, status) {
            if (status === 'CRÍTICO') {
                criticalCount++;
                document.getElementById('critical-count').textContent = criticalCount;
            }
            allTemps.push(newTemp);
            const avg = allTemps.reduce((a, b) => a + b, 0) / allTemps.length;
            document.getElementById('avg-temp').textContent = `${avg.toFixed(1)}°C`;
        }

        function buildItem(evento) {
            const isCrit = evento.status === 'CRÍTICO';
            const div = document.createElement("div");
            div.className = `p-3 rounded border border-slate-800 flex flex-col gap-1 transition-all ${isCrit ? 'bg-rose-500/5 border-l-rose-500 border-l-4' : 'bg-slate-900/40 border-l-slate-600 border-l-4'}`;
            div.innerHTML = `
                <div class="flex justify-between items-start">
                    <span class="text-[9px] font-bold text-slate-100 uppercase font-mono">${evento.topico}</span>
                    <span class="text-[9px] px-1.5 py-0.5 rounded ${isCrit ? 'bg-rose-500 text-white' : 'bg-slate-700 text-slate-100'} font-bold">
                        ${evento.status}
                    </span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-base font-mono font-bold ${isCrit ? 'text-rose-500' : 'text-white'}">${evento.valor}°C</span>
                    <span class="text-[9px] text-slate-100 font-mono">${new Date(evento.data_hora).toLocaleTimeString('pt-BR')}</span>
                </div>
            `;
            return div;
        }

        const wsUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws/events';
        const ws = new WebSocket(wsUrl);

        async function loadInitialState(date) {
            try {
                const res = await fetch(`/events${date ? `?date=${date}` : ''}`);
                const data = await res.json();
                const list = document.getElementById('event-list');
                list.innerHTML = '';
                
                tempChart.data.labels = [];
                tempChart.data.datasets[0].data = [];
                
                if (data.eventos?.length > 0) {
                    data.eventos.forEach(evt => {
                        list.prepend(buildItem(evt));
                        updateStats(evt.valor, evt.status);
                        tempChart.data.labels.unshift(new Date(evt.data_hora).toLocaleTimeString('pt-BR'));
                        tempChart.data.datasets[0].data.unshift(evt.valor);
                    });
                }
                tempChart.update();
            } catch (err) { console.error('Erro de conexão:', err); }
        }

        document.getElementById('filter-btn').onclick = () => loadInitialState(document.getElementById('filter-date').value);
        document.getElementById('today-btn').onclick = () => loadInitialState();
        
        loadInitialState();

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'new_event') {
                const evt = data.event;
                const list = document.getElementById('event-list');
                if (list.querySelector('p.italic')) list.innerHTML = '';
                list.prepend(buildItem(evt));
                if (list.children.length > 20) list.removeChild(list.lastChild);
                
                tempChart.data.labels.push(new Date(evt.data_hora).toLocaleTimeString('pt-BR'));
                tempChart.data.datasets[0].data.push(evt.valor);
                if (tempChart.data.labels.length > 20) {
                    tempChart.data.labels.shift();
                    tempChart.data.datasets[0].data.shift();
                }
                tempChart.update('none');
                updateStats(evt.valor, evt.status);
            }
        };
    </script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</body>
</html>
